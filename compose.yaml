services:
  nginx:
    image: nginx:alpine
    container_name: todo_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - gateway

  redis:
    image: redis:7-alpine
    container_name: todo_redis
    restart: unless-stopped
    env_file:
      - ./users/.env
    command: ["sh", "-c", "redis-server --requirepass \"$$REDIS_PASSWORD\" --appendonly yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping"]
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: todo_rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "rabbitmq-diagnostics -q ping && rabbitmq-diagnostics -q check_running && rabbitmq-diagnostics -q check_port_listener 5672",
        ]
      timeout: 5s
      retries: 15
      start_period: 20s


  frontend:
    build: ./frontend
    container_name: todo_frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    depends_on:
      - gateway

  gateway:
    build: ./gateway
    container_name: todo_gateway
    env_file:
      - ./gateway/.env
    depends_on:
      user_api:
        condition: service_started
      todo_api:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  user_api:
    build: ./users
    container_name: todo_user_api
    env_file:
      - ./users/.env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      user_db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      timeout: 5s
      retries: 10
      start_period: 10s

  user_notification_worker:
    build: ./users
    container_name: todo_user_notification_worker
    command: ["python", "-m", "app.workers.notification_worker"]
    env_file:
      - ./users/.env
    depends_on:
      user_api:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
        
  user_db:
    image: postgres:18
    container_name: todo_user_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_db
    ports:
      - "5432:5432"
    volumes:
      - user_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app_db"]
      timeout: 5s
      retries: 10
      start_period: 5s

  todo_api:
    build: ./todos
    container_name: todo_todo_api
    env_file:
      - ./todos/.env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      todo_db:
        condition: service_healthy
      user_api:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      retries: 10
      start_period: 10s

  todo_event_publisher:
    build: ./todos
    container_name: todo_event_publisher
    command: ["python", "-m", "app.workers.outbox_publisher"]
    env_file:
      - ./todos/.env
    depends_on:
      todo_api:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  audit_worker:
    build: ./todos
    container_name: todo_audit_worker
    command: ["python", "-m", "app.workers.audit_worker"]
    env_file:
      - ./todos/.env
    depends_on:
      todo_api:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy


  todo_db:
    image: postgres:18
    container_name: todo_todo_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: todo_db
    ports:
      - "5433:5432"
    volumes:
      - todo_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d todo_db"]
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  redis_data:
  user_postgres_data:
  todo_postgres_data:
  rabbitmq_data:
